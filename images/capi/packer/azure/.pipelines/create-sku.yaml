# Required pipeline variables:
# - BUILD_POOL - Azure DevOps build pool to use
# - AZURE_CLIENT_ID - Service principal ID
# - AZURE_CLIENT_SECRET - Service principal secret
# - AZURE_TENANT_ID - tenant ID
# - KUBERNETES_VERSION - version of Kubernetes to create the sku for, e.g. `1.16.2`
# - OFFER - the name of the offer to create the sku for
# - OS - target of build e.g. `Ubuntu/Windows`
# - OS_VERSION - target of build e.g. `22.04/2019/2022-containerd`
# - PUBLISHER - the name of the publisher to create the sku for
# - SKU_TEMPLATE_FILE - the base template file to use for the sku
# - VM_GENERATION - VM generation to use, e.g. `gen2`

jobs:
- job: create_sku
  timeoutInMinutes: 120
  strategy:
    maxParallel: 0
  pool:
    name: $(BUILD_POOL)
  steps:
  - template: managed-identity-login.yml
  - script: |
      echo << EOF > sku-publishing-info.json
      {
      "publisher" : "cncf-upstream",
      "offer" : "capi",
      "sku_id" : "azurelinux-3-gen1",
      "k8s_version" : "1.29.5"
      }
      EOF
      echo << EOF > vhd-publishing-info.json
      {
        "vhd_base_url": "https://capi1716242339mzci.blob.core.windows.net/system/Microsoft.Compute/Images/cluster-api-vhds/capi-1716242362-osDisk.dummy.vhd",
        "vhd_url": "https://capi1716242339mzci.blob.core.windows.net/system/Microsoft.Compute/Images/cluster-api-vhds/capi-1716242362-osDisk.dummy.vhd?st=not-a-sas",
        "storage_account_name": "capi1716242339mzci",
        "resource_group_name": "cluster-api-images",
        "tags": "creationTimestamp=2024-05-20T21:58:46Z jobName=image-builder-vhd"
      }
      EOF
      ./scripts/new-sku.sh
    displayName: Create a new marketplace SKU
    workingDirectory: '$(system.defaultWorkingDirectory)/images/capi/packer/azure'
    env:
      AZURE_TOKEN: $(access.token)
  - task: PublishPipelineArtifact@1
    inputs:
      artifact: 'sku-info'
      path: '$(system.defaultWorkingDirectory)/images/capi/packer/azure/sku-publishing-info.json'
